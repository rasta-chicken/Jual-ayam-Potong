<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RASTA Chicken - Order Ayam Broiler</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)),
            url('ayam.jpg');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

header {
  background: linear-gradient(135deg, #2e7d32, #66bb6a);
  color: white;
  text-align: center;
  padding: 25px;
  border-bottom-left-radius: 25px;
  border-bottom-right-radius: 25px;
}

header h1 { margin: 0; font-size: 22px; }
header p { margin: 5px 0 0; font-size: 14px; }

.container {
  padding: 15px;
  max-width: 600px;
  margin: auto;
}

.card {
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(5px);
  padding: 15px;
  border-radius: 16px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.12);
}

.info {
  background: #e8f5e9;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 15px;
  font-size: 13px;
  border-left: 4px solid #2e7d32;
}

.input-group {
  display: flex;
  align-items: center;
  background: #fafafa;
  border: 1px solid #ccc;
  border-radius: 10px;
  padding: 0 10px;
  margin-top: 8px;
  margin-bottom: 12px;
}

.input-group span {
  margin-right: 8px;
  font-size: 16px;
}

.input-group input,
.input-group select,
.input-group textarea {
  border: none;
  outline: none;
  flex: 1;
  padding: 11px 0;
  background: transparent;
  font-size: 14px;
}

option[disabled] {
  font-style: italic;
  color: #999;
}

.option-group {
  display: flex;
  gap: 10px;
  margin-top: 8px;
  margin-bottom: 12px;
}

.option-btn {
  flex: 1;
  height: 40px;
  border: none;
  background: #e8f5e9; /* hijau pucat */
  color: #2e7d32;
  border-radius: 10px;
  font-size: 12px;
  cursor: pointer;
  transition: 0.25s;
}

.option-btn.active {
  background: linear-gradient(135deg, #2e7d32, #66bb6a);
  color: white;
}

button.main {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #2e7d32, #66bb6a);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: bold;
}

textarea {
  min-height: 90px;
  resize: vertical;
}
/* hanya pilihan yang tebal */
.input-group select {
  font-weight: bold;
}

/* tombol juga tebal */
.option-btn {
  font-weight: bold;
}

button.main {
  font-weight: bold;
}

.option-btn {
  font-weight: bold;
}

button.main {
  font-weight: bold;
}
</style>
</head>

<body>

<header>
  <h1>RASTA Chicken</h1>
  <p>Ayam Segar | Potong Gratis | Bersih Gratis</p>
</header>

<div class="container">
<div class="card">

<div class="info">
📌 Pesan sekarang, ayam segar langsung dari peternakan<br>
🎉 Melayani pesanan partai kecil/besar untuk acara keluarga / pesta<br>
🚚 Bisa antar ke rumah<br>
🔪 Bisa potong sesuai permintaan
</div>

<div class="input-group">
  <span>👤</span>
  <input type="text" id="nama" placeholder="Nama Anda">
</div>

<div class="input-group">
  <span>📱</span>
  <input type="tel" id="hp" placeholder="Nomor WhatsApp">
</div>

<div class="input-group">
  <span>🐔</span>
  <select id="jenis">
    <option value="">Pilih Jenis Ayam</option>
    <option>Ayam Hidup</option>
    <option>Ayam Potong</option>
  </select>
</div>

<div class="input-group">
  <span>🔢</span>
  <input type="number" id="jumlah" placeholder="Jumlah (ekor)">
</div>

<div class="input-group">
  <span>💰</span>
  <select id="harga">
    <option value="">Pilih Harga / Berat Hidup</option>
    <option value="50000" disabled>Rp50rb (0.8-1.0 kg) ❌Stok Habis</option>
    <option value="55000" disabled>Rp55rb (1.0-1.2 kg) ❌Stok Habis</option>
    <option value="65000" disabled>Rp65rb (1.3-1.4 kg) ❌Stok Habis</option>
    <option value="75000" disabled>Rp75rb (1.5-1.6 kg) ❌Stok Habis</option>
    <option value="80000" disabled>Rp80rb (1.7-1.8 kg) ❌Stok Habis</option>
    <option value="90000">Rp90rb (1.9-2.0 kg) ✅Ready</option> 
    <option value="100000" disabled>Rp100rb (2.1-2.3 kg) ❌Stok Habis</option>
  </select>
</div>

<div class="input-group">
  <span>🔪</span>
  <select id="layanan" onchange="togglePotongan()">
    <option value="">Pilih Layanan</option>
    <option>Tidak</option>
    <option>Bersih Bulu Saja</option>
    <option>Bersihkan Bulu + Potong</option>
  </select>
</div>

<div class="input-group" id="potongan-group" style="display:none;">
  <span>🍗</span>
  <select id="potongan">
    <option value="">Pilih Jumlah Potongan</option>
    <option>4 potong /ekor</option>
    <option>8 potong /ekor</option>
    <option>10 potong /ekor</option>
    <option>12 potong /ekor</option>
    <option>14 potong /ekor</option>
    <option>16 potong /ekor</option>
    <option>18 potong /ekor</option>
    <option>20 potong /ekor</option>
    <option>22 potong /ekor</option>
  </select>
</div>

<label><b>Pengambilan</b></label>
<div class="option-group">
  <button type="button" class="option-btn" onclick="setPengambilan(this,'Ambil di tempat')">📦 Ambil di tempat</button>
  <button type="button" class="option-btn" onclick="setPengambilan(this,'Diantar ke rumah')">🚚 Antar ke rumah</button>
</div>

<div class="input-group">
  <span>📍</span>
  <textarea id="alamat" placeholder="Alamat lengkap (jika di antar)"></textarea>
</div>

<button class="main" onclick="kirimWA()">🟢 Pesan Sekarang via WhatsApp</button>

</div>
</div>

<script>
let pengambilanTerpilih = "";

function setPengambilan(el, value) {
  document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('active'));
  el.classList.add('active');
  pengambilanTerpilih = value;
}

function togglePotongan() {
  var layanan = document.getElementById('layanan').value;
  var potonganGroup = document.getElementById('potongan-group');

  if (layanan.includes('Potong')) {
    potonganGroup.style.display = 'flex';
  } else {
    potonganGroup.style.display = 'none';
    document.getElementById('potongan').value = "";
  }
}

function kirimWA() {
  var nama = document.getElementById('nama').value;
  var hp = document.getElementById('hp').value;
  var jenis = document.getElementById('jenis').value;
  var jumlah = document.getElementById('jumlah').value;

  var hargaSelect = document.getElementById('harga');
  var hargaText = hargaSelect.options[hargaSelect.selectedIndex].text;
  var layanan = document.getElementById('layanan').value;
  var potongan = document.getElementById('potongan').value;
  var alamat = document.getElementById('alamat').value;

  if (!nama || !hp || !jenis || !jumlah || !hargaSelect.value || !layanan || !pengambilanTerpilih) {
    alert("Lengkapi dulu semua data!");
    return;
  }

  if (pengambilanTerpilih === "Diantar ke rumah" && !alamat) {
    alert("Isi alamat dulu!");
    return;
  }

  var pesan =
`Halo kak, saya mau pesan ayam:

👤 Nama: *${nama}*
📱 WA: *${hp}*
🐔 Jenis: *${jenis}*
🔢 Jumlah: *${jumlah}* ekor
💰 Harga: *${hargaText}*
🔪 Layanan: *${layanan}*
${potongan ? "🍗 Potongan: *" + potongan + "*\n" : ""}📦 Pengambilan: *${pengambilanTerpilih}*
📍 Alamat: *"${alamat}*`;

  window.open(
    "https://wa.me/6282278861707?text=" + encodeURIComponent(pesan),
    "_blank"
  );
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RASTA Chicken - Order Ayam Broiler</title>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #eef2f3, #dfe9f3);
}

/* HEADER */
header {
  background: linear-gradient(135deg, #2e7d32, #66bb6a);
  color: white;
  text-align: center;
  padding: 25px 15px;
  border-bottom-left-radius: 25px;
  border-bottom-right-radius: 25px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.15);
}

header h1 { margin: 0; font-size: 24px; }
header p { margin: 5px 0 0; font-size: 13px; opacity: 0.9; }

.container {
  padding: 15px;
  max-width: 600px;
  margin: auto;
  margin-top: -20px;
}

/* CARD */
.card {
  background: white;
  padding: 18px;
  border-radius: 18px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

/* INFO */
.info {
  background: #e8f5e9;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 15px;
  font-size: 13px;
  border-left: 4px solid #2e7d32;
}

/* INPUT */
input, select, textarea {
  width: 100%;
  padding: 11px;
  margin-top: 6px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 14px;
  transition: 0.2s;
  background: #fafafa;
}

input:focus, select:focus, textarea:focus {
  border-color: #2e7d32;
  outline: none;
  box-shadow: 0 0 0 2px rgba(46,125,50,0.15);
  background: #fff;
}

/* OPTION DISABLED */
option[disabled] {
  font-style: italic;
  color: #999;
}

/* TOGGLE BUTTON */
.option-group {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  margin-bottom: 12px;
}

.option-btn {
  flex: 1;
  height: 40px;
  border: none;
  background: #f1f1f1;
  color: #444;
  border-radius: 10px;
  font-size: 12px;
  cursor: pointer;
  transition: 0.2s;
}

.option-btn:hover {
  background: #e0e0e0;
}

.option-btn.active {
  background: linear-gradient(135deg, #2e7d32, #66bb6a);
  color: white;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(46,125,50,0.3);
}

/* BUTTON UTAMA */
button.main {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #2e7d32, #66bb6a);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button.main:hover {
  transform: scale(1.02);
  box-shadow: 0 5px 15px rgba(46,125,50,0.4);
}
</style>
</head>

<body>

<header>
  <h1>RASTA Chicken</h1>
  <p>Ayam Segar | Potong Gratis | Bersih Gratis</p>
</header>

<div class="container">
<div class="card">

<div class="info">
📌 Pesan sekarang, ayam segar langsung dari peternakan<br>
🎉 Melayani pesanan partai kecil/besar untuk acara keluarga / pesta<br>
🚚 Bisa antar ke rumah<br>
🔪 Bisa potong sesuai permintaan
</div>

<input type="text" id="nama" placeholder="Nama Anda">
<input type="text" id="hp" placeholder="Nomor WhatsApp">

<select id="jenis">
  <option value="">Pilih Jenis Ayam</option>
  <option>Ayam Hidup</option>
  <option>Ayam Potong</option>
</select>

<input type="number" id="jumlah" placeholder="Jumlah (ekor)">

<select id="harga">
  <option value="">Pilih Harga / Berat Hidup</option>
  <option value="50000" disabled>Rp50rb (0.8-1.0 kg) ❌Stok Habis</option>
  <option value="55000" disabled>Rp55rb (1.0-1.2 kg) ❌Stok Habis</option>
  <option value="65000" disabled>Rp65rb (1.3-1.4 kg) ❌Stok Habis</option>
  <option value="75000" disabled>Rp75rb (1.5-1.6 kg) ❌Stok Habis</option>
  <option value="80000" disabled>Rp80rb (1.7-1.8 kg) ❌Stok Habis</option>
  <option value="90000">Rp90rb (1.9-2.0 kg) ✅Ready</option> 
  <option value="100000" disabled>Rp100rb (2.1-2.3 kg) ❌Stok Habis</option>
</select>

<select id="layanan" onchange="togglePotongan()">
  <option value="">Pilih Layanan</option>
  <option>Tidak</option>
  <option>Bersih Bulu Saja</option>
  <option>Bersihkan Bulu + Potong</option>
</select>

<select id="potongan" style="display:none;">
  <option value="">Pilih Jumlah Potongan</option>
  <option>4 potong /ekor</option>
  <option>8 potong /ekor</option>
  <option>10 potong /ekor</option>
  <option>12 potong /ekor</option>
  <option>14 potong /ekor</option>
  <option>16 potong /ekor</option>
  <option>18 potong /ekor</option>
  <option>20 potong /ekor</option>
  <option>22 potong /ekor</option>
</select>

<label><b>Pengambilan</b></label>
<div class="option-group">
  <button type="button" class="option-btn" onclick="setPengambilan(this,'Ambil di tempat')">Ambil di tempat</button>
  <button type="button" class="option-btn" onclick="setPengambilan(this,'Diantar ke rumah')">Antar ke rumah</button>
</div>

<textarea id="alamat" placeholder="Alamat lengkap (jika di antar)"></textarea>

<button class="main" onclick="kirimWA()">📲 Pesan Sekarang via WhatsApp</button>

</div>
</div>

<script>
let pengambilanTerpilih = "";

function setPengambilan(el, value) {
  document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('active'));
  el.classList.add('active');
  pengambilanTerpilih = value;
}

function togglePotongan() {
  var layanan = document.getElementById('layanan').value;
  var potongan = document.getElementById('potongan');

  if (layanan.includes('Potong')) {
    potongan.style.display = 'block';
  } else {
    potongan.style.display = 'none';
    potongan.value = "";
  }
}

function kirimWA() {
  var nama = document.getElementById('nama').value;
  var hp = document.getElementById('hp').value;
  var jenis = document.getElementById('jenis').value;
  var jumlah = document.getElementById('jumlah').value;

  var hargaSelect = document.getElementById('harga');
  var hargaText = hargaSelect.options[hargaSelect.selectedIndex].text;
  var layanan = document.getElementById('layanan').value;
  var potongan = document.getElementById('potongan').value;
  var alamat = document.getElementById('alamat').value;

  var pesan =
`*Halo kaka, Saya mau pesan Ayam..*

Nama        : *${nama}*
WhatsApp: *${hp}*
Jenis         : *${jenis}*
Jumlah     : *${jumlah} ekor*
Harga        : *${hargaText}*
Layanan   : *${layanan}*
${potongan ? "Potongan : *" + potongan + "*\n" : ""}Pengambilan: *${pengambilanTerpilih}*
Alamat     : *${alamat}*`;

  var nomor = "6282278861707";

  window.open(
    "https://wa.me/" + nomor + "?text=" + encodeURIComponent(pesan),
    "_blank"
  );
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RASTA Chicken - Order Ayam Broiler</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)),
            url('ayam.jpg');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

header {
  background: linear-gradient(135deg, #2e7d32, #66bb6a);
  color: white;
  text-align: center;
  padding: 25px;
  border-bottom-left-radius: 25px;
  border-bottom-right-radius: 25px;
}

header h1 { margin: 0; font-size: 22px; }
header p { margin: 5px 0 0; font-size: 14px; }

.container {
  padding: 15px;
  max-width: 600px;
  margin: auto;
}

.card {
  background: rgba(255,255,255,0.95);
  padding: 15px;
  border-radius: 16px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.12);
}

.info {
  background: #e8f5e9;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 15px;
  font-size: 13px;
  border-left: 4px solid #2e7d32;
}

.input-group {
  display: flex;
  align-items: center;
  background: #fafafa;
  border: 1px solid #ccc;
  border-radius: 10px;
  padding: 0 10px;
  margin-bottom: 12px;
  position: relative;
}

.input-group span {
  margin-right: 8px;
  font-size: 16px;
}

.input-group input,
.input-group select,
.input-group textarea {
  border: none;
  outline: none;
  flex: 1;
  padding: 11px 0;
  background: transparent;
  font-size: 14px;
}

.check {
  position: absolute;
  right: 10px;
  color: #4caf50;
  display: none;
}

.input-group.filled .check {
  display: block;
}

/* tombol pilihan */
.option-group {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
}

.option-btn {
  flex: 1;
  height: 40px;
  border: 2px solid #2e7d32;
  background: #e8f5e9;
  color: #2e7d32;
  border-radius: 10px;
  font-size: 12px;
  font-weight: bold;
}

.option-btn.active {
  background: linear-gradient(135deg, #2e7d32, #66bb6a);
  color: white;
}

button.main {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #2e7d32, #66bb6a);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: bold;
}

textarea {
  min-height: 90px;
  resize: vertical;
}
</style>
</head>

<body>

<header>
  <h1>RASTA Chicken</h1>
  <p>Ayam Segar | Potong Gratis | Bersih Gratis</p>
</header>

<div class="container">
<div class="card">

<div class="info">
📌 Pesan ayam segar langsung dari peternakan<br>
🚚 Bisa antar / ambil di tempat
</div>

<!-- INPUT -->
<div class="input-group checkable">
  <span>👤</span>
  <input type="text" id="nama" placeholder="Nama Anda">
  <span class="check">✔</span>
</div>

<div class="input-group checkable">
  <span>📱</span>
  <input type="tel" id="hp" placeholder="Nomor WhatsApp">
  <span class="check">✔</span>
</div>

<div class="input-group checkable">
  <span>🐔</span>
  <select id="jenis">
    <option value="">Pilih Jenis Ayam</option>
    <option>Ayam Hidup</option>
    <option>Ayam Potong</option>
  </select>
  <span class="check">✔</span>
</div>

<div class="input-group checkable">
  <span>🔢</span>
  <input type="number" id="jumlah" placeholder="Jumlah (ekor)">
  <span class="check">✔</span>
</div>

<div class="input-group checkable">
  <span>💰</span>
  <select id="harga">
    <option value="">Pilih Harga</option>
    <option value="90000">Rp90rb (1.9-2.0 kg) READY</option>
  </select>
  <span class="check">✔</span>
</div>

<div class="input-group checkable">
  <span>🔪</span>
  <select id="layanan" onchange="togglePotongan()">
    <option value="">Pilih Layanan</option>
    <option>Tidak</option>
    <option>Bersih Bulu Saja</option>
    <option>Bersih + Potong</option>
  </select>
  <span class="check">✔</span>
</div>

<div class="input-group checkable" id="potongan-group" style="display:none;">
  <span>🍗</span>
  <select id="potongan">
    <option value="">Pilih Potongan</option>
    <option>4</option>
    <option>8</option>
    <option>10</option>
    <option>12</option>
  </select>
  <span class="check">✔</span>
</div>

<label><b>Pengambilan</b></label>
<div class="option-group" id="pickupGroup">
  <button type="button" class="option-btn" onclick="setPengambilan(this,'Ambil')">Ambil</button>
  <button type="button" class="option-btn" onclick="setPengambilan(this,'Antar')">Antar</button>
</div>

<div class="input-group checkable">
  <span>📍</span>
  <textarea id="alamat" placeholder="Alamat (jika antar)"></textarea>
  <span class="check">✔</span>
</div>

<button class="main" onclick="kirimWA()">Pesan via WhatsApp</button>

</div>
</div>

<script>
let pengambilan = "";

// centang helper
function setFilled(el, group) {
  if (el.value && el.value.trim() !== "") {
    group.classList.add("filled");
  } else {
    group.classList.remove("filled");
  }
}

// input + select + textarea check
document.querySelectorAll(".checkable input, .checkable select, .checkable textarea")
.forEach(el => {
  el.addEventListener("input", () => setFilled(el, el.parentElement));
  el.addEventListener("change", () => setFilled(el, el.parentElement));
});

// tombol pengambilan (dibatasi scope)
function setPengambilan(el, value) {
  const group = document.getElementById("pickupGroup");
  group.querySelectorAll(".option-btn").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  pengambilan = value;
}

function togglePotongan() {
  const layanan = document.getElementById("layanan").value;
  const potongan = document.getElementById("potongan-group");
  potongan.style.display = layanan.includes("Potong") ? "flex" : "none";
}

function kirimWA() {
  let nama = document.getElementById("nama").value;
  let hp = document.getElementById("hp").value;
  let jenis = document.getElementById("jenis").value;
  let jumlah = document.getElementById("jumlah").value;
  let harga = document.getElementById("harga").selectedOptions[0].text;
  let layanan = document.getElementById("layanan").value;
  let potongan = document.getElementById("potongan").value;
  let alamat = document.getElementById("alamat").value;

  if (!nama || !hp || !jenis || !jumlah || !layanan || !pengambilan) {
    alert("Lengkapi data!");
    return;
  }

  if (hp.length < 10 || !/^[0-9]+$/.test(hp)) {
    alert("Nomor WA tidak valid");
    return;
  }

  let msg =
`Pesanan Ayam:
Nama: ${nama}
WA: ${hp}
Jenis: ${jenis}
Jumlah: ${jumlah}
Harga: ${harga}
Layanan: ${layanan}
Potongan: ${potongan || "-"}
Pengambilan: ${pengambilan}
Alamat: ${alamat}`;

  window.open("https://wa.me/6282278861707?text=" + encodeURIComponent(msg), "_blank");
}
</script>

</body>
</html>
